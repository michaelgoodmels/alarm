services:
  mysql:
    image: mysql:8.4
    container_name: homealarm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: homealarm
      MYSQL_USER: alarm
      MYSQL_PASSWORD: alarmpw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "alarm", "-palarmpw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
